<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krunker Lite - 遊戲選擇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .version-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-v1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-v1:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-v2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .btn-v2:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(245, 87, 108, 0.4);
        }
        
        .btn-v3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .btn-v3:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.4);
        }
        
        .btn-v4 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .btn-v4:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(250, 112, 154, 0.4);
        }
        
        .btn-v5 {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        
        .btn-v5:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        
        .version-label {
            font-size: 0.9em;
            margin-top: 5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Krunker Lite</h1>
        <p>選擇你想要遊玩的版本</p>
        
        <div class="version-buttons">
            <a href="Krunker-litev1.1.html" class="btn btn-v1">
                版本 1.1
                <div class="version-label">基礎版本</div>
            </a>
            <a href="Krunker-litev1.2.html" class="btn btn-v2">
                版本 1.2
                <div class="version-label">改進版本</div>
            </a>
            <a href="Krunker-litev1.3.html" class="btn btn-v3">
                版本 1.3
                <div class="version-label">測試版本</div>
            </a>
            <a href="Krunker-litev1.4.html" class="btn btn-v4">
                版本 1.4
                <div class="version-label">前版本</div>
            </a>
            <a href="Krunker-litev1.5.html" class="btn btn-v5">
                版本 1.5
                <div class="version-label">最新版本 ⭐ 推薦</div>
            </a>
        </div>
    </div>
</body>
</html>
